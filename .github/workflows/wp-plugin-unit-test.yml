name: WordPress Plugin Unit test

on:
  push:
    branches:
      - '**'
      - '!svn-trunk'
      - '!test-matrix'
    tags-ignore:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  phpunit:
    name: WordPress ${{ matrix.wordpress }} * PHP v${{ matrix.php }} * ${{ matrix.os }} * Multisite ${{ matrix.multisite }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false

      matrix:
        os: [ ubuntu-24.04 ]
        # PHP Compatibility and WordPress Versions - https://make.wordpress.org/core/handbook/references/php-compatibility-and-wordpress-versions/
        php: [ '7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5' ]
        wordpress: [ latest, nightly ]
        multisite: [ 0 ]

    env:
      PHP_VERSION: ${{ matrix.php }}
      WP_VERSION: ${{ matrix.wordpress }}
      WP_MULTISITE: ${{ matrix.multisite }}

    services:
      database:
        image: mysql:8.4
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root

    steps:
      - uses: actions/checkout@v4

      - name: Install SVN
        run: sudo apt-get install -y subversion

      - name: Setup PHP v${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, php-mysql

      - name: Install PHPUnit
        run: |
          # for PHP Compatibility - https://phpunit.de/supported-versions.html
          # PHPUnit Compatibility and WordPress Versions - https://make.wordpress.org/core/handbook/references/phpunit-compatibility-and-wordpress-versions/
          if [[ ${PHP_VERSION:0:1} == "8" ]] ; then
            composer global require "phpunit/phpunit=9.*"
          elif [[ $PHP_VERSION == "7.0" ]] ; then
            composer global require "phpunit/phpunit=5.*|6.*"
          # for WP_VERSION < 4.6 due to PHP Fatal error: Class 'PHPUnit_Framework_TestCase' not found
          elif [[ ${PHP_VERSION:0:1} == "7" ]] && [[ "$WP_VERSION" < 4.6* ]] ; then
            composer global require "phpunit/phpunit=5.*"
          # for WP_VERSION < 5.0 due to Fatal error: Class PHPUnit_Util_Test may not inherit from final class (PHPUnit\Util\Test)
          elif [[ ${PHP_VERSION:0:1} == "7" ]] && [[ "$WP_VERSION" < 5.0* ]] ; then
            composer global require "phpunit/phpunit=5.*|6.*"
          else
            composer global require "phpunit/phpunit=8.*|9.*"
          fi

      - name: Install PHPUnit Polyfills library
        run: composer global require "yoast/phpunit-polyfills=2"

      - name: Install wp tests
        run: bash bin/install-wp-tests.sh wordpress_test root root 0.0.0.0:3306 $WP_VERSION

      - name: Run PHPUnit - WordPress ${{ matrix.wordpress }} * Multisite ${{ matrix.multisite }}
        run: phpunit

  phpunit-legacy:
    name: WordPress ${{ matrix.wordpress }} * PHP v${{ matrix.php }} * ${{ matrix.os }} * Multisite ${{ matrix.multisite }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false

      matrix:
        os: [ ubuntu-24.04 ]
        php: [ '7.4' ]
        wordpress: [ '5.9', '6.3' ]
        multisite: [ 0 ]

    env:
      PHP_VERSION: ${{ matrix.php }}
      WP_VERSION: ${{ matrix.wordpress }}
      WP_MULTISITE: ${{ matrix.multisite }}

    services:
      database:
        image: mysql:8.4
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root

    steps:
      - uses: actions/checkout@v4

      - name: Install SVN
        run: sudo apt-get install -y subversion

      - name: Setup PHP v${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, php-mysql

      - name: Install PHPUnit
        run: |
          if [[ ${PHP_VERSION:0:1} == "8" ]] ; then
            composer global require "phpunit/phpunit=9.*"
          elif [[ $PHP_VERSION == "7.0" ]] ; then
            composer global require "phpunit/phpunit=5.*|6.*"
          # for WP_VERSION < 4.6 due to PHP Fatal error: Class 'PHPUnit_Framework_TestCase' not found
          elif [[ ${PHP_VERSION:0:1} == "7" ]] && [[ "$WP_VERSION" < 4.6* ]] ; then
            composer global require "phpunit/phpunit=5.*"
          # for WP_VERSION < 5.0 due to Fatal error: Class PHPUnit_Util_Test may not inherit from final class (PHPUnit\Util\Test)
          elif [[ ${PHP_VERSION:0:1} == "7" ]] && [[ "$WP_VERSION" < 5.0* ]] ; then
            composer global require "phpunit/phpunit=5.*|6.*"
          else
            composer global require "phpunit/phpunit=8.*|9.*"
          fi

      - name: Install PHPUnit Polyfills library
        run: composer global require "yoast/phpunit-polyfills=2"

      - name: Install wp tests
        run: bash bin/install-wp-tests.sh wordpress_test root root 0.0.0.0:3306 $WP_VERSION

      - name: Run PHPUnit - WordPress ${{ matrix.wordpress }} * Multisite ${{ matrix.multisite }}
        run: |
          if [[ $PHP_VERSION == "5.6" ]] || [[ $PHP_VERSION == "7.0" ]] ; then
            phpunit --configuration phpunit-legacy.xml
          else
            phpunit
          fi

  phpcs:
    name: PHP CodeSniffer
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false

      matrix:
        os: [ ubuntu-24.04 ]
        php: [ '8.4' ]
        wordpress: [ latest ]
        multisite: [ 0 ]

    env:
      PHP_VERSION: ${{ matrix.php }}
      WP_VERSION: ${{ matrix.wordpress }}
      WP_MULTISITE: ${{ matrix.multisite }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP v${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, php-mysql

      - name: Install php_codesniffer library and PHP_CodeSniffer rules
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --dev wp-coding-standards/wpcs:"^3.0"
          composer global require --dev phpcsstandards/phpcsutils:"^1.0"
          composer global require --dev phpcsstandards/phpcsextra:"^1.0"
          composer global require --dev phpcompatibility/phpcompatibility-wp:"*"

      - name: phpcs --config-set
        run: |
          phpcs --config-set installed_paths /home/runner/.composer/vendor/wp-coding-standards/wpcs,/home/runner/.composer/vendor/phpcsstandards/phpcsextra,/home/runner/.composer/vendor/phpcsstandards/phpcsutils,/home/runner/.composer/vendor/phpcompatibility/php-compatibility,/home/runner/.composer/vendor/phpcompatibility/phpcompatibility-paragonie,/home/runner/.composer/vendor/phpcompatibility/phpcompatibility-wp
          phpcs -i

      - name: Run phpcs
        run: phpcs -p -s -v ./ --standard=./phpcs.ruleset.xml --extensions=php
